<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Londres con Minomi - Galería de fotos</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* =========================
           FONDO BANDERA
        ========================== */

        .flag-background {
            background-image:
                url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 60 30%22><rect fill=%22%23012169%22 width=%2260%22 height=%2230%22/><path d=%22M0,0 L60,30 M60,0 L0,30%22 stroke=%22%23FFF%22 stroke-width=%222%22/><path d=%22M30,0 V30 M0,15 H60%22 stroke=%22%23C8102E%22 stroke-width=%221%22/><path d=%22M30,0 V30 M0,15 H60%22 stroke=%22%23FFF%22 stroke-width=%220.5%22/></svg>');

            background-size: contain;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
        }

        .flag-background::before {
            content: "";
            position: absolute;
            inset: 0;
            background: transparent;
            backdrop-filter: none;
        }

        /* Bandera más pequeña en móvil */
        @media (max-width: 768px) {
            .flag-background {
                background-size: 140%;
            }
        }

        /* =========================
           SCROLL SIDEBAR
        ========================== */

        aside::-webkit-scrollbar {
            width: 8px;
        }

        aside::-webkit-scrollbar-thumb {
            background: #9333ea;
            border-radius: 10px;
        }

        aside::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }

        aside {
            scrollbar-width: thin;
            scrollbar-color: #9333ea rgba(255, 255, 255, 0.1);
        }

        /* =========================
           THUMBNAIL ACTIVA
        ========================== */

        .thumbnail.active {
            border: 3px solid gold;
            transform: scale(1.05);
        }

        /* =========================
           RESPONSIVE
        ========================== */

        /* Eliminado: ahora todo el responsive es con Tailwind */
        /* Si necesitas media queries personalizadas, agrégalas aquí */
    </style>
</head>

<body class="bg-slate-100 overflow-x-hidden">

    <!-- =========================
         HEADER
    ========================== -->

    <header
        class="sticky top-0 z-50 bg-gradient-to-r from-blue-900 via-purple-900 to-purple-950 shadow-xl h-[100px] md:h-[128px]">

        <div
            class="flex flex-col md:flex-row md:items-center md:justify-between px-4 py-4 md:px-8 xl:px-16 w-full items-center text-center">


            <!-- IZQUIERDA (MÓVIL: autoplayBtn, hamburguesa, título; DESKTOP: hamburguesa, título, autoplayBtn) -->
            <div class="flex items-center gap-3 w-full md:w-auto relative">
                <!-- AUTOPLAY SOLO MÓVIL -->
                <p><button id="autoplayBtnMobileHeader" aria-label="Reproducir carrusel"
                        class="block md:hidden p-0 mr-2 bg-transparent shadow-none hover:scale-110 transition-transform duration-200">
                        <svg id="autoplayIconMobileHeader" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"
                            class="w-8 h-8">
                            <circle cx="16" cy="16" r="15" fill="#dc2626" stroke="#991b1b" stroke-width="2" />
                            <polygon id="playShapeMobileHeader" points="13,10 25,16 13,22" fill="white" />
                        </svg>
                    </button></p>

                <!-- BOTÓN HAMBURGUESA -->
                <p><button id="openSidebarBtn" aria-label="Abrir menú"
                        class="lg:hidden ml-1 mr-3 p-2 rounded transition hover:bg-purple-800 hover:scale-110 focus:outline-none focus:ring-2 focus:ring-purple-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button></p>

                <!-- TÍTULO -->
                <h1 class="text-base sm:text-lg md:text-2xl font-bold flex-1 text-center leading-tight text-white">
                    Fotos Londres
                </h1>

                <!-- AUTOPLAY SOLO DESKTOP/TABLET -->
                <p><button id="autoplayBtn" aria-label="Reproducir carrusel"
                        class="hidden md:block hover:scale-110 transition-transform duration-200 ml-2">
                        <svg id="autoplayIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" class="w-9 h-9">
                            <circle cx="16" cy="16" r="15" fill="#dc2626" stroke="#991b1b" stroke-width="2" />
                            <polygon id="playShape" points="13,10 25,16 13,22" fill="white" />
                        </svg>
                    </button></p>

            </div>

            <!-- DERECHA -->
            <div class="flex flex-col md:flex-row md:items-center gap-1 mt-2 md:mt-0 w-full">

                <p class="hidden md:block text-blue-100 text-sm md:text-base md:mr-4">
                    Yolanda y Minomi
                </p>

                <a href="https://www.nacionrex.com/doramas/lee-min-ho-minomi-leoncito-peluche-precio-historia-20210707-0015.html"
                    target="_blank" rel="noopener"
                    class="text-white text-sm md:text-base font-semibold hover:text-blue-200 transition-colors md:ml-auto">
                    ¿Qué es un Minomi?
                </a>

            </div>

        </div>

    </header>

    <!-- =========================
         OVERLAY MÓVIL
    ========================== -->



    <!-- =========================
         SIDEBAR
    ========================== -->

    <aside id="sidebarMenu"
        class="fixed left-0 top-0 w-64 h-full overflow-y-auto bg-gradient-to-b from-blue-900 via-purple-900 to-purple-950 p-5 shadow-2xl z-50 transform -translate-x-full transition-transform duration-300 lg:translate-x-0 lg:top-[128px] lg:w-56 lg:h-[calc(100vh-128px)] lg:block lg:z-40">

        <!-- BOTÓN CERRAR -->
        <p><button id="closeSidebarBtn" aria-label="Cerrar menú"
                class="lg:hidden absolute top-4 right-4 p-2 rounded hover:bg-purple-800 focus:outline-none focus:ring-2 focus:ring-purple-400">

                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />

                </svg>

            </button></p>

        <h2 class="text-white font-bold text-lg mb-4">
            Fotos del viaje
        </h2>

        <ol id="sidebarList" class="space-y-3 text-sm text-blue-100">
        </ol>

    </aside>

    <!-- =========================
         MAIN
    ========================== -->

    <main class="flag-background min-h-screen relative flex items-start justify-center lg:pl-56 lg:pt-2">

        <div class="relative z-10 w-full max-w-7xl px-4 pt-8 pb-4">

            <!-- LAYOUT -->
            <div class="flex flex-col xl:flex-row items-center gap-4 xl:gap-24">

                <!-- BOTONES ACCIÓN: juntos en móvil, a los lados en desktop -->
                <div
                    class="flex flex-col gap-3 w-full px-2 xl:w-auto xl:justify-center xl:items-center xl:h-full xl:pr-0 xl:pl-0 xl:flex-col xl:gap-16">
                    <p><button id="prevBtn"
                            class="w-full xl:w-[140px] bg-red-600 hover:bg-red-700 text-white font-bold px-3 py-2 md:px-5 md:py-3 rounded-lg shadow-lg transition active:scale-95 mb-0 xl:mb-0 text-center">
                            ◀ Anterior
                        </button></p>
                    <p><button id="nextBtn"
                            class="w-full xl:w-[140px] bg-red-600 hover:bg-red-700 text-white font-bold px-3 py-2 md:px-5 md:py-3 rounded-lg shadow-lg transition active:scale-95 mt-3 xl:mt-10 text-center">
                            Siguiente ▶
                        </button></p>
                </div>

                <!-- CONTENIDO -->
                <div class="flex flex-col xl:flex-row items-center gap-4 xl:gap-8">

                    <!-- IMAGEN -->

                    <figure class="w-[300px] h-[360px] sm:w-[380px] sm:h-[450px]">
                        <img id="mainImage" src="./img/despegando.png" alt="Foto galería Londres"
                            class="w-full h-full object-cover rounded-2xl shadow-lg">
                    </figure>

                    <!-- CARD -->

                    <section class="gallery-card mx-2 bg-white/95 rounded-2xl p-6">

                        <h3 id="imageTitle" class="text-xl font-bold text-gray-800 mb-2">

                            Despegando de Barcelona

                        </h3>

                        <p id="imageDesc" class="text-gray-600 mb-3">

                            

                        </p>

                        <ul id="caracteristicasList" class="list-disc list-inside text-gray-700 text-sm space-y-1 mb-4">
                        </ul>

                        <p class="text-sm text-gray-500">

                            Foto
                            <span id="currentIndex">1</span>
                            /
                            <span id="totalImages">16</span>

                        </p>

                    </section>


                </div>

                <!-- =========================
                 THUMBNAILS
            ========================== -->

                <section class="mt-10 max-w-5xl mx-auto">



                    <div id="thumbnails"
                        class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-7 xl:grid-cols-8 gap-4 max-h-48 overflow-y-auto mt-12">

                    </div>

                </section>

            </div>

    </main>

    <!-- =========================
         JAVASCRIPT
    ========================== -->

    <script src="js/claseFotos.js"></script>
    <script src="js/fotos.js"></script>
    <script src="js/galeria.js"></script>

</body>

</html>
